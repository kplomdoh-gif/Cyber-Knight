                <p>Customize your interface theme and display options.</p>

                    <select id="backgroundGradient">

                        <option value="linear-gradient(to right bottom, white, #26a69a, #4db6ac, white)">Teal Waves</option>
                    </select>
                    <button type="button" id="applyBackground">Apply</button>
